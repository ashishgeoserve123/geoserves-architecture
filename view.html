<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoPerform Docs</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:      #060c18;
      --panel:   #0a1228;
      --panel-2: #0e1a36;
      --text:    #e2e8f8;
      --muted:   #8899c0;
      --accent:  #60a5fa;
      --border:  #1e2d5a;
      --code-bg: #0d1628;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .topbar a:hover { text-decoration: underline; }

    .topbar .sep { color: var(--muted); font-size: 0.8rem; }

    .topbar .file-title {
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Content ── */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 28px 64px;
    }

    #loading {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 40px 0;
    }

    #error {
      color: #f87171;
      font-size: 0.85rem;
      padding: 40px 0;
    }

    /* ── Markdown styles ── */
    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
      color: var(--text);
      margin: 1.6em 0 0.5em;
      line-height: 1.3;
    }

    .md h1 { font-size: 1.75rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .md h2 { font-size: 1.3rem;  border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .md h3 { font-size: 1.1rem; }
    .md h4 { font-size: 0.95rem; color: var(--accent); }

    .md p { color: var(--muted); line-height: 1.75; margin: 0.75em 0; font-size: 0.9rem; }

    .md a { color: var(--accent); text-decoration: underline; }

    .md ul, .md ol {
      padding-left: 1.5em;
      margin: 0.6em 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .md li { margin: 0.2em 0; }

    .md code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.82rem;
      color: #93c5fd;
    }

    .md pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      overflow-x: auto;
      margin: 1em 0;
    }

    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: #cbd5e1;
      font-size: 0.82rem;
      line-height: 1.65;
    }

    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 1em 0;
      background: rgba(96,165,250,.06);
      border-radius: 0 8px 8px 0;
    }

    .md blockquote p { color: var(--text); }

    .md table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.82rem;
    }

    .md th {
      background: var(--panel-2);
      color: var(--accent);
      padding: 9px 12px;
      text-align: left;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .md td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      color: var(--muted);
      vertical-align: top;
    }

    .md tr:nth-child(even) td { background: rgba(255,255,255,.02); }

    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    .md strong { color: var(--text); }
    .md em { color: #a5b4fc; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">← GeoPerform Docs</a>
    <span class="sep">/</span>
    <span class="file-title" id="fileTitle">Loading…</span>
  </div>
  <div class="content">
    <div id="loading">Loading document…</div>
    <div id="error" style="display:none;"></div>
    <div id="output" class="md" style="display:none;"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file   = params.get("file");

    if (!file) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("error").style.display   = "block";
      document.getElementById("error").textContent     = "No file specified. Add ?file=path/to/file.md";
    } else {
      document.getElementById("fileTitle").textContent = file.split("/").pop();
      document.title = file.split("/").pop() + " — GeoPerform Docs";

      fetch(file)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}: ${file}`);
          return r.text();
        })
        .then(md => {
          document.getElementById("loading").style.display = "none";
          const out = document.getElementById("output");
          out.innerHTML = marked.parse(md);
          out.style.display = "block";
        })
        .catch(err => {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display   = "block";
          document.getElementById("error").textContent     = "Could not load file: " + err.message;
        });
    }
  </script>
</body>
</html>
